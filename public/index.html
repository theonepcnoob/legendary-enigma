<!DOCTYPE html>
<html>
<body>
    <h1>Subathon Goal</h1>
    <div id="goal-display">Loading goals...</div>
    <script>
        fetch('/api/goals').then(r => r.json()).then(data => {
            document.getElementById('goal-display').innerText = JSON.stringify(data);
        });
    </script>
</body>
</html>
